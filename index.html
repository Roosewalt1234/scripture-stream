  <title>ScriptureStream - Deep Bible Study</title>
  <link rel="stylesheet" href="/index.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,200..900;1,200..900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background-color: #fdfaf6;
    }
    .font-serif {
      font-family: 'Crimson Pro', serif;
    }
    /* Smooth transitions for themes */
    .theme-transition {
      transition: background-color 0.3s ease, color 0.3s ease;
    }
    /* Hide scrollbar but keep functionality */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* Keyframe Animations */
    @keyframes fade-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slide-in-from-bottom {
      from { transform: translateY(2rem); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .animate-in {
      animation-fill-mode: both;
    }
    .fade-in {
      animation-name: fade-in;
    }
    .slide-in-from-bottom-8 {
      animation-name: slide-in-from-bottom;
    }
    .duration-1000 {
      animation-duration: 1000ms;
    }
  </style>
